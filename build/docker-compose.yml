
services:
  postgres:
    image: postgres:15-alpine
    container_name: gaming-postgres
    environment:
      POSTGRES_USER: gamer
      POSTGRES_PASSWORD: gaming_pass
      POSTGRES_DB: games_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: